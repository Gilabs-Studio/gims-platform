services:
  postgres:
    image: postgres:16-alpine
    container_name: gims-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gims_erp_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gims-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gims-platform-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - gims-network
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gims-platform-api
    ports:
      - "8087:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=gims_erp_db
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production-min-32-chars}
      - JWT_ACCESS_TTL=24
      - JWT_REFRESH_TTL=7
      - STORAGE_UPLOAD_DIR=/app/uploads
      - STORAGE_BASE_URL=/uploads
      - STORAGE_MAX_UPLOAD_SIZE=10485760
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gims-network

networks:
  gims-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  redis_data:
